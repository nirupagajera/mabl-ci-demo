name: Run mabl Tests

on:
  push:
    branches:
      - master

jobs:
  mabl-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install mabl CLI
        run: npm install -g @mablhq/mabl-cli

      - name: Run mabl Tests
        uses: mablhq/github-run-tests-action@v1
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
        with:
          plan-labels: Test Mabl Zadoon Blank Field
          application-id: X1Gy84LsnWZfRRxgHdS0Rg
          environment-id: q2Pb9Zqiglp9MKrNA9BzmA
